# Optional sibling stack: Grafana only.
#
# Prometheus runs inside the main `docker-compose.yml` so metrics are
# scraped automatically whenever madcap_fast is up. This stack is a
# separate lifecycle for Grafana — bring it up only when you want a
# dashboard; teardown doesn't affect metric collection or retention.
#
# Grafana joins the `madcap_fast_monitoring` docker network (created by
# the main compose) so it reaches Prometheus by service name
# (`prometheus:9090`) instead of via the host bridge. That network is
# not published on the public IP, so Prometheus stays private to
# containers.
#
# Usage:
#   docker compose up -d                                   # main stack (brings prometheus up)
#   docker compose -f docker-compose.monitoring.yml up -d  # + grafana
#   open http://127.0.0.1:9007  (grafana, admin / admin — change it)

services:
  grafana:
    image: grafana/grafana:latest
    container_name: madcap_fast_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Public URL used to generate share/embed links. Set via env:
      #   GF_SERVER_ROOT_URL=https://grafana.extragornax.fr/
      #   GF_SERVER_DOMAIN=grafana.extragornax.fr
      # Leave unset to keep the default (http://localhost:3000).
      GF_SERVER_ROOT_URL: "${GF_SERVER_ROOT_URL:-}"
      GF_SERVER_DOMAIN: "${GF_SERVER_DOMAIN:-}"
      # Anonymous read-only dashboard viewing. Visitors land directly on
      # the dashboards with Viewer role (no edit, no share, no admin).
      # Flip to "false" to require login.
      GF_AUTH_ANONYMOUS_ENABLED: "${GF_AUTH_ANONYMOUS_ENABLED:-true}"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_ANONYMOUS_HIDE_VERSION: "true"
    volumes:
      - grafana-data:/var/lib/grafana
     # - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
     # - ./monitoring/grafana/dashboards:/etc/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-9007}:3000"
    networks:
      - default
      - monitoring

networks:
  default:
  monitoring:
    name: madcap_fast_monitoring
    external: true

volumes:
  grafana-data:
