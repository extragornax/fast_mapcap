# Optional sibling stack: Prometheus + Grafana scraping `madcap_fast` on the host.
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#   open http://127.0.0.1:3000  (grafana, admin / admin — change it)
#   open http://127.0.0.1:9090  (prometheus, for ad-hoc queries)
#
# The Prometheus container reaches `madcap_fast` via host.docker.internal:9004.
# `extra_hosts: host-gateway` maps that name on Linux; it already works on
# Mac / Windows Docker Desktop. To scrape a different host or port, edit
# monitoring/prometheus.yml.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: madcap_fast_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: madcap_fast_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
