# Optional sibling stack: Grafana only.
#
# Prometheus now runs inside the main `docker-compose.yml` (so metrics are
# scraped automatically whenever madcap_fast is up). This stack is a
# separate lifecycle for Grafana — bring it up only when you want a
# dashboard; teardown doesn't affect metric collection or retention.
#
# Usage:
#   docker compose -f docker-compose.monitoring.yml up -d
#   open http://127.0.0.1:9006  (grafana, admin / admin — change it)
#
# Grafana reaches the Prometheus container on the host bridge
# (`host.docker.internal:9090`). `extra_hosts: host-gateway` maps that
# name on Linux; it already works on Mac / Windows Docker Desktop.

services:
  grafana:
    image: grafana/grafana:latest
    container_name: madcap_fast_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-9006}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  grafana-data:
