  function renderList() {
    renderCategoryBar();
    const root = document.getElementById('plist');
    const list = filteredParticipants();
    const cd = cactusAt(currentPlaybackTime());
    const frag = document.createDocumentFragment();
    for (const p of list) {
      const div = document.createElement('div');
      div.className = 'p' + (selected && selected.id === p.id ? ' selected' : '');
      div.dataset.id = p.id;
      const nick = p.nickname ? ` “${p.nickname}”` : '';
      const lpMs = utcMs(p.last_ping);
      const dotClass = p.sleeping ? 'sleep' : (lpMs != null && (Date.now() - lpMs) > 15 * 60000 ? 'stale' : 'ok');
      const isFav = favs.has(p.id);
      const rankNum = catFilter ? p.rank : p.overall_rank;
      let deltaHtml = '';
      if (cd && p.distance != null) {
        const dk = p.distance - cd.km;
        const dh = dk / cd.speedKmh;
        const cls = Math.abs(dk) < 0.5 ? 'even' : (dk > 0 ? 'ahead' : 'behind');
        deltaHtml = `<div class="delta ${cls}" title="vs 🌵 cactus pacer">${fmtDelta(dk, dh)}</div>`;
      }
      div.innerHTML = `
        <div class="rank">#${rankNum ?? '-'}</div>
        <div class="who">
          <div class="name"><span class="dot ${dotClass}"></span>${escape(p.first_name || '')} ${escape(p.last_name || '')}${escape(nick)}${orgaBadge(p)}</div>
          <div class="meta">bib ${escape(p.bib || '-')} · ${escape((p.attributes && p.attributes.category) || '')} · ${sinceText(p.last_ping)}</div>
        </div>
        <div class="num"><b>${fmtKm(p.distance)}</b><br/>${fmtKmh(p.speed)}${deltaHtml}</div>
        <button class="star ${isFav ? 'on' : ''}" data-action="fav" data-id="${escape(p.id)}" title="favorite" aria-pressed="${isFav}">★</button>
      `;
      div.addEventListener('click', (ev) => {
        if (ev.target.closest('[data-action="fav"]')) return;
        selected = p;
        render();
      });
      div.addEventListener('mouseenter', () => previewTrace(p.id));
      div.addEventListener('mouseleave', () => previewTrace(null));
      frag.appendChild(div);
    }
    root.replaceChildren(frag);
  }

  function renderOverview() {
    const info = state.info;
    const geo = state.geo;
    const parts = state.participants;
    const active = parts.filter(p => p.status === 'REGISTERED' || p.status === 'ACTIVE' || !!p.last_ping).length;
    const sleeping = parts.filter(p => p.sleeping).length;
    const started = parts.filter(p => (p.distance || 0) > 0).length;
    const body = document.getElementById('body');
    body.innerHTML = `
      <h2>${escape(info.name)} · <span style="color:var(--mute)">${escape(info.start_place_name || '')} → ${escape(info.end_place_name || '')}</span></h2>
      <p class="tagline">${escape(info.description || '')}</p>
      <div class="grid">
        <div class="stat"><div class="label">Participants</div><div class="value">${parts.length}</div></div>
        <div class="stat"><div class="label">Active</div><div class="value">${active}</div></div>
        <div class="stat"><div class="label">Sleeping</div><div class="value">${sleeping}</div></div>
        <div class="stat"><div class="label">Started</div><div class="value">${started}</div></div>
        <div class="stat"><div class="label">Distance</div><div class="value">${escape(info.distance || '—')}</div></div>
        <div class="stat"><div class="label">Surface</div><div class="value">${escape(info.surface || '—')}</div></div>
        <div class="stat"><div class="label">Starts</div><div class="value">${fmtTime(info.start_date)}</div></div>
        <div class="stat"><div class="label">Ends</div><div class="value">${fmtTime(info.end_date)}</div></div>
      </div>
      <h3 style="margin:18px 0 6px">Checkpoints</h3>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Type</th><th class="n">Lat</th><th class="n">Lng</th></tr></thead>
        <tbody>${(geo.cps || []).map(c => `
          <tr>
            <td>${c.order}</td>
            <td><b>${escape(c.short_name || '')}</b> — ${escape(c.name || '')}</td>
            <td>${escape(c.cp_type || '')}</td>
            <td class="n">${c.latitude.toFixed(5)}</td>
            <td class="n">${c.longitude.toFixed(5)}</td>
          </tr>`).join('')}</tbody>
      </table>
      ${renderTopSpeedsBlock()}
      <p style="color:var(--mute);margin-top:18px">Select a participant to see their splits and latest position.</p>
    `;
  }

  function renderTopSpeedsBlock() {
    const list = computeTopSpeeds();
    if (!list.length) return '';
    const top = list.slice(0, 10);
    const startMs = eventStartMs();
    const rows = top.map((x, i) => {
      const name = x.p ? `${x.p.first_name || ''} ${x.p.last_name || ''}`.trim() : 'unknown';
      const when = startMs != null && x.at ? new Date(startMs + x.at[0] * 1000)
        .toLocaleString(undefined, { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—';
      const favStar = favs.has(x.pid) ? ' <span style="color:#f1c40f">★</span>' : '';
      return `<tr>
        <td>${i + 1}</td>
        <td><a class="who-link" data-action="detail" data-id="${escape(x.pid)}">${escape(name)}</a>${favStar}${orgaBadge(x.p)}</td>
        <td class="n"><b>${x.max.toFixed(1)} km/h</b></td>
        <td>${escape(when)}</td>
      </tr>`;
    }).join('');
    return `
      <h3 style="margin:18px 0 6px">Peak speeds — top 10</h3>
      <table>
        <thead><tr><th>#</th><th>Rider</th><th class="n">Max speed</th><th>When</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function sparklineSvg(pts, W, H) {
    if (!pts.length) return '';
    let minV = Infinity, maxV = -Infinity, minT = Infinity, maxT = -Infinity;
    for (const [t, v] of pts) {
      if (v == null || isNaN(v)) continue;
      if (v < minV) minV = v;
      if (v > maxV) maxV = v;
      if (t < minT) minT = t;
      if (t > maxT) maxT = t;
    }
    if (!isFinite(minV) || maxT === minT) return '';
    const spanV = Math.max(1e-6, maxV - minV);
    const spanT = Math.max(1e-6, maxT - minT);
    const x = t => ((t - minT) / spanT) * W;
    const y = v => H - ((v - minV) / spanV) * (H - 4) - 2;
    let d = '';
    for (let i = 0; i < pts.length; i++) {
      const [t, v] = pts[i];
      if (v == null || isNaN(v)) continue;
      d += (d ? 'L' : 'M') + x(t).toFixed(1) + ' ' + y(v).toFixed(1);
    }
    const area = d + ` L${W} ${H} L0 ${H} Z`;
    return `<path class="area" d="${area}"/><path class="line" d="${d}"/>`;
  }

  function fmtDur(s) {
    if (!isFinite(s) || s < 30) return '0m';
    const h = Math.floor(s / 3600);
    const m = Math.round((s - h * 3600) / 60);
    if (h > 0) return `${h}h${String(m).padStart(2, '0')}`;
    return `${m}m`;
  }

  function computeRestBlocks(track) {
    const SPEED_THRESHOLD = 1.5; // km/h
    const MIN_BLOCK_S = 20 * 60;
    const blocks = [];
    if (!track || track.length < 2) return { blocks, totalRest: 0 };
    let cur = null;
    for (let i = 0; i < track.length; i++) {
      const sp = track[i][4];
      const t = track[i][0];
      const stopped = sp != null && sp <= SPEED_THRESHOLD;
      if (stopped) {
        if (!cur) cur = { start: t, end: t };
        else cur.end = t;
      } else {
        if (cur && cur.end - cur.start >= MIN_BLOCK_S) blocks.push(cur);
        cur = null;
      }
    }
    if (cur && cur.end - cur.start >= MIN_BLOCK_S) blocks.push(cur);
    const totalRest = blocks.reduce((a, b) => a + (b.end - b.start), 0);
    return { blocks, totalRest };
  }

  function renderRestTimeline(p) {
    const track = ((state.tracks && state.tracks.tracks) || []).find(t => t.participant_id === p.id);
    if (!track || !track.track || track.track.length < 2) return '';
    const pts = track.track;
    const t0 = pts[0][0], tN = pts[pts.length - 1][0];
    if (tN <= t0) return '';
    const { blocks, totalRest } = computeRestBlocks(pts);
    const W = 600, H = 32;
    const xOf = t => ((t - t0) / (tN - t0)) * W;
    const startMs = eventStartMs();
    const fmtBlockStart = (relS) => startMs
      ? new Date(startMs + relS * 1000).toLocaleString(undefined, { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' })
      : '';
    const rests = blocks.map(b => {
      const x = xOf(b.start);
      const w = Math.max(1, xOf(b.end) - x);
      const title = `${fmtDur(b.end - b.start)} · ${fmtBlockStart(b.start)}`;
      return `<rect class="rest" x="${x.toFixed(1)}" y="4" width="${w.toFixed(1)}" height="${H - 8}" rx="2" ry="2"><title>${escape(title)}</title></rect>`;
    }).join('');
    const longest = blocks.reduce((a, b) => Math.max(a, b.end - b.start), 0);
    const total = tN - t0;
    const moving = Math.max(0, total - totalRest);
    return `
      <div class="profile timeline">
        <h4>Rest &amp; movement <span class="range">${fmtDur(moving)} moving · ${fmtDur(totalRest)} at rest${blocks.length ? ` · ${blocks.length} block${blocks.length === 1 ? '' : 's'} · longest ${fmtDur(longest)}` : ''}</span></h4>
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <rect class="move" x="0" y="4" width="${W}" height="${H - 8}" rx="2" ry="2"/>
          ${rests}
        </svg>
      </div>
    `;
  }

  function rollingAvgSpeed(track, windowSec = 3600) {
    if (!track || !track.length) return null;
    const tN = track[track.length - 1][0];
    const threshold = tN - windowSec;
    let sum = 0, n = 0;
    for (let i = track.length - 1; i >= 0; i--) {
      if (track[i][0] < threshold) break;
      const s = track[i][4];
      if (s != null && !isNaN(s)) { sum += s; n++; }
    }
    return n > 0 ? sum / n : null;
  }

  function courseTotalKm() {
    const cp = computeCactusPath();
    if (cp && cp.total) return cp.total;
    const raw = state && state.info && state.info.distance;
    if (!raw) return null;
    const n = parseFloat(String(raw).replace(/[^\d.]/g, ''));
    return isFinite(n) && n > 0 ? n : null;
  }

  function trackOf(pid) {
    return ((state.tracks && state.tracks.tracks) || []).find(t => t.participant_id === pid);
  }

  function etaNextCpMs(p) {
    const d = p.distance_to_next_cp;
    const km = (d && typeof d === 'object') ? d.distance : d;
    if (km == null || isNaN(+km) || +km <= 0) return null;
    let speed = p.speed;
    if (!speed || speed < 3) {
      const tr = trackOf(p.id);
      const rolling = rollingAvgSpeed(tr && tr.track);
      if (rolling && rolling > 2) speed = rolling;
    }
    if (!speed || speed < 1) return null;
    return (+km / speed) * 3600 * 1000;
  }

  function etaFinishMs(p) {
    const total = courseTotalKm();
    if (!total || p.distance == null) return null;
    const remaining = total - p.distance;
    if (remaining <= 0.5) return null;
    const tr = trackOf(p.id);
    let speed = rollingAvgSpeed(tr && tr.track);
    if (!speed || speed < 1) {
      const start = eventStartMs();
      if (start && p.distance > 0) {
        const hours = (Date.now() - start) / 3600000;
        if (hours > 0) speed = p.distance / hours;
      }
    }
    if (!speed || speed < 1) return null;
    return Date.now() + (remaining / speed) * 3600 * 1000;
  }

  function fmtEtaDur(ms) { return ms == null ? '—' : fmtDur(ms / 1000); }
  function fmtEtaAt(ms) {
    if (ms == null) return '—';
    return new Date(ms).toLocaleString(undefined, { weekday: 'short', hour: '2-digit', minute: '2-digit' });
  }

  let topSpeedsCache = { tracks: null, list: null };
  function computeTopSpeeds() {
    if (!state || !state.tracks) return [];
    if (topSpeedsCache.tracks === state.tracks && topSpeedsCache.list) return topSpeedsCache.list;
    const tracks = state.tracks.tracks || [];
    const partsById = new Map(state.participants.map(p => [p.id, p]));
    const out = [];
    for (const t of tracks) {
      if (!t.track || !t.track.length) continue;
      let max = 0, at = null;
      for (const pt of t.track) {
        if (pt[4] != null && pt[4] > max) { max = pt[4]; at = pt; }
      }
      if (max > 0 && at) out.push({ pid: t.participant_id, max, at, p: partsById.get(t.participant_id) });
    }
    out.sort((a, b) => b.max - a.max);
    topSpeedsCache = { tracks: state.tracks, list: out };
    return out;
  }

  let kmMarkersCache = { tracks: null, byPid: null };
  function kmMarkersFor(track, step = 100) {
    if (!track || track.length < 2) return [];
    const markers = [];
    let cum = 0, nextTarget = step;
    for (let i = 1; i < track.length; i++) {
      const a = track[i - 1], b = track[i];
      const seg = haversineKm([a[1], a[2]], [b[1], b[2]]);
      const prev = cum;
      cum += seg;
      while (cum >= nextTarget) {
        const f = seg > 0 ? (nextTarget - prev) / seg : 0;
        const t = a[0] + (b[0] - a[0]) * f;
        markers.push({ km: nextTarget, t });
        nextTarget += step;
      }
    }
    return markers;
  }
  function getKmMarkersByPid(step = 100) {
    if (!state || !state.tracks) return new Map();
    if (kmMarkersCache.tracks === state.tracks && kmMarkersCache.step === step) return kmMarkersCache.byPid;
    const m = new Map();
    for (const tr of (state.tracks.tracks || [])) {
      m.set(tr.participant_id, kmMarkersFor(tr.track, step));
    }
    kmMarkersCache = { tracks: state.tracks, step, byPid: m };
    return m;
  }

  function renderKmSegments(p, step = 100) {
    const track = ((state.tracks && state.tracks.tracks) || []).find(t => t.participant_id === p.id);
    if (!track || !track.track || track.track.length < 2) return '';
    const byPid = getKmMarkersByPid(step);
    const myMarkers = byPid.get(p.id) || [];
    if (!myMarkers.length) return '';
    const parts = state.participants || [];
    const tracksById = new Map((state.tracks.tracks || []).map(t => [t.participant_id, t]));

    const rows = [];
    for (let i = 0; i < myMarkers.length; i++) {
      const startMy = i === 0 ? track.track[0][0] : myMarkers[i - 1].t;
      const endMy = myMarkers[i].t;
      const dMy = endMy - startMy;

      const durs = [];
      for (const pp of parts) {
        const mk = byPid.get(pp.id);
        if (!mk || mk.length <= i) continue;
        const tr = tracksById.get(pp.id);
        if (!tr || !tr.track || !tr.track.length) continue;
        const start = i === 0 ? tr.track[0][0] : mk[i - 1].t;
        const dur = mk[i].t - start;
        if (dur > 0) durs.push({ pid: pp.id, dur });
      }
      durs.sort((a, b) => a.dur - b.dur);
      const idx = durs.findIndex(x => x.pid === p.id);
      const rank = idx >= 0
        ? `#${idx + 1} / ${durs.length}${idx > 0 ? ` · +${fmtDur(dMy - durs[0].dur)}` : ''}`
        : '—';

      rows.push(`<tr>
        <td>${i * step}–${(i + 1) * step} km</td>
        <td>${fmtDur(dMy)}</td>
        <td class="n">${rank}</td>
      </tr>`);
    }

    return `
      <h3 style="margin:18px 0 6px">${step} km segments</h3>
      <table>
        <thead><tr><th>Distance</th><th>Time</th><th class="n">Segment rank</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    `;
  }

  // --- Weather card (Open-Meteo, no API key) ---
  const WEATHER_CACHE = new Map(); // "lat|lng" → { t: msEpoch, data }
  const WEATHER_TTL_MS = 15 * 60 * 1000;

  async function fetchWeather(lat, lng) {
    // Round to ~1 km precision to share cache entries between riders near each other.
    const key = `${lat.toFixed(2)}|${lng.toFixed(2)}`;
    const cached = WEATHER_CACHE.get(key);
    if (cached && (Date.now() - cached.t) < WEATHER_TTL_MS) return cached.data;
    const qs = `latitude=${lat.toFixed(3)}&longitude=${lng.toFixed(3)}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,precipitation&wind_speed_unit=kmh&timezone=UTC`;
    try {
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${qs}`);
      if (!res.ok) return null;
      const data = await res.json();
      WEATHER_CACHE.set(key, { t: Date.now(), data });
      return data;
    } catch {
      return null;
    }
  }

  function weatherEmoji(code) {
    if (code == null) return '❓';
    if (code === 0) return '☀️';
    if (code <= 2) return '🌤️';
    if (code === 3) return '☁️';
    if (code >= 45 && code <= 48) return '🌫️';
    if (code >= 51 && code <= 57) return '🌦️';
    if (code >= 61 && code <= 67) return '🌧️';
    if (code >= 71 && code <= 77) return '🌨️';
    if (code >= 80 && code <= 82) return '🌧️';
    if (code >= 85 && code <= 86) return '❄️';
    if (code >= 95) return '⛈️';
    return '❓';
  }

  function weatherLabel(code) {
    const map = {
      0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
      45: 'Fog', 48: 'Icy fog',
      51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
      56: 'Freezing drizzle', 57: 'Heavy freezing drizzle',
      61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
      66: 'Freezing rain', 67: 'Heavy freezing rain',
      71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
      77: 'Snow grains',
      80: 'Rain showers', 81: 'Heavy showers', 82: 'Violent showers',
      85: 'Snow showers', 86: 'Heavy snow showers',
      95: 'Thunderstorm', 96: 'Thunderstorm w/ hail', 99: 'Severe thunderstorm'
    };
    return map[code] || (code != null ? `Code ${code}` : '—');
  }

  async function updateWeatherCard(pid, lat, lng) {
    const card = document.getElementById('weather-card');
    if (!card || card.dataset.pid !== pid) return;
    const data = await fetchWeather(lat, lng);
    // Selection may have changed while we awaited.
    const fresh = document.getElementById('weather-card');
    if (!fresh || fresh.dataset.pid !== pid) return;
    if (!data || !data.current) {
      fresh.innerHTML = `<span class="wc-emoji">❓</span><div class="wc-main"><div class="wc-temp">—</div><div class="wc-meta">weather unavailable</div></div>`;
      return;
    }
    const c = data.current;
    const emoji = weatherEmoji(c.weather_code);
    const label = weatherLabel(c.weather_code);
    const temp = c.temperature_2m != null ? `${c.temperature_2m.toFixed(1)} °C` : '—';
    const bits = [];
    if (c.apparent_temperature != null) bits.push(`feels ${c.apparent_temperature.toFixed(1)} °C`);
    if (c.wind_speed_10m != null) {
      const windDir = c.wind_direction_10m;
      const arrow = windDir != null
        ? `<span class="wind-arrow" style="transform:rotate(${((windDir + 180) % 360)}deg)">↑</span>`
        : '';
      const compass = windDir != null ? ` ${compassCardinal(windDir)}` : '';
      bits.push(`${arrow}${c.wind_speed_10m.toFixed(0)} km/h${compass}`);
    }
    if (c.precipitation != null && c.precipitation > 0) bits.push(`${c.precipitation} mm precip`);
    fresh.innerHTML = `
      <span class="wc-emoji">${emoji}</span>
      <div class="wc-main">
        <div class="wc-temp">${escape(temp)} · ${escape(label)}</div>
        <div class="wc-meta">${bits.join(' · ')} · ${lat.toFixed(3)}, ${lng.toFixed(3)}</div>
      </div>
    `;
  }

  function compassCardinal(deg) {
    const names = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    return names[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
  }

  function renderNearby(p) {
    const my = lastPointOf(p.id);
    if (!my) return '';
    const items = [];
    for (const other of state.participants) {
      if (other.id === p.id) continue;
      const pt = lastPointOf(other.id);
      if (!pt) continue;
      const d = haversineKm([my.lat, my.lng], [pt.lat, pt.lng]);
      items.push({ pid: other.id, p: other, dist: d });
    }
    if (!items.length) return '';
    items.sort((a, b) => a.dist - b.dist);
    const top = items.slice(0, 10);
    const myDist = p.distance ?? null;
    const rows = top.map(x => {
      const name = `${x.p.first_name || ''} ${x.p.last_name || ''}`.trim() || 'unknown';
      const fav = favs.has(x.pid) ? ' <span style="color:#f1c40f">★</span>' : '';
      const deltaKm = myDist != null && x.p.distance != null ? x.p.distance - myDist : null;
      const deltaCell = deltaKm == null
        ? '—'
        : `<span style="color:${deltaKm >= 0 ? 'var(--good)' : 'var(--bad)'}">${deltaKm >= 0 ? '+' : ''}${deltaKm.toFixed(1)} km</span>`;
      return `<tr>
        <td>#${x.p.overall_rank ?? '-'}</td>
        <td><a class="who-link" data-action="detail" data-id="${escape(x.pid)}">${escape(name)}</a>${fav}${orgaBadge(x.p)}</td>
        <td class="n">${x.dist.toFixed(1)} km</td>
        <td class="n">${deltaCell}</td>
      </tr>`;
    }).join('');
    return `
      <h3 style="margin:18px 0 6px">Nearby riders <span style="color:var(--mute);font-weight:normal;font-size:12px">— closest by straight-line</span></h3>
      <table>
        <thead><tr><th>#</th><th>Rider</th><th class="n">Gap</th><th class="n">Δ course</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderSegments(p) {
    const cps = ((state.geo && state.geo.cps) || []).slice().sort((a, b) => a.order - b.order);
    if (cps.length < 2) return '';
    const parts = state.participants || [];

    // Per-segment: sorted [{pid, dur}] for everyone who completed it
    const segStats = new Map();
    for (let i = 1; i < cps.length; i++) {
      const fromOrder = cps[i - 1].order;
      const toOrder = cps[i].order;
      const durs = [];
      for (const pp of parts) {
        const cr = pp.cp_rank;
        if (!Array.isArray(cr)) continue;
        const a = cr[fromOrder], b = cr[toOrder];
        if (!a || !b) continue;
        const t1 = utcMs(a[1]);
        const t2 = utcMs(b[1]);
        if (t1 == null || t2 == null || t2 <= t1) continue;
        durs.push({ pid: pp.id, dur: (t2 - t1) / 1000 });
      }
      durs.sort((a, b) => a.dur - b.dur);
      segStats.set(i, durs);
    }

    const rows = [];
    for (let i = 1; i < cps.length; i++) {
      const from = cps[i - 1], to = cps[i];
      const cr = p.cp_rank;
      const a = Array.isArray(cr) ? cr[from.order] : null;
      const b = Array.isArray(cr) ? cr[to.order] : null;
      let durCell = '—';
      let rankCell = '—';
      if (a && b) {
        const t1 = utcMs(a[1]);
        const t2 = utcMs(b[1]);
        if (t1 != null && t2 != null && t2 > t1) {
          const d = (t2 - t1) / 1000;
          durCell = fmtDur(d);
          const stats = segStats.get(i) || [];
          const idx = stats.findIndex(x => x.pid === p.id);
          if (idx >= 0 && stats.length) {
            const gap = d - stats[0].dur;
            rankCell = `#${idx + 1} / ${stats.length}${idx > 0 ? ` · +${fmtDur(gap)}` : ''}`;
          }
        }
      }
      rows.push(`<tr>
        <td>${from.order} → ${to.order}</td>
        <td><b>${escape(from.short_name || '')}</b> → <b>${escape(to.short_name || '')}</b></td>
        <td>${durCell}</td>
        <td class="n">${rankCell}</td>
      </tr>`);
    }

    return `
      <h3 style="margin:18px 0 6px">Segments</h3>
      <table>
        <thead><tr><th>#</th><th>From → To</th><th>Time</th><th class="n">Segment rank</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
      </table>
    `;
  }

  function renderProfiles(p) {
    const track = ((state.tracks && state.tracks.tracks) || []).find(t => t.participant_id === p.id);
    if (!track || !track.track || track.track.length < 2) return '';
    const pts = track.track;
    const elev = pts.map(pt => [pt[0], pt[3]]);
    const speed = pts.map(pt => [pt[0], pt[4]]);
    const battery = pts.map(pt => [pt[0], pt[5]]);
    const elevVals = elev.map(x => x[1]).filter(v => v != null && !isNaN(v));
    const spdVals = speed.map(x => x[1]).filter(v => v != null && !isNaN(v));
    const batVals = battery.map(x => x[1]).filter(v => v != null && !isNaN(v));
    const W = 600, H = 80;
    const eMin = elevVals.length ? Math.min(...elevVals) : null;
    const eMax = elevVals.length ? Math.max(...elevVals) : null;
    const sMax = spdVals.length ? Math.max(...spdVals) : null;
    const sAvg = spdVals.length ? spdVals.reduce((a, b) => a + b, 0) / spdVals.length : null;
    const bMin = batVals.length ? Math.min(...batVals) : null;
    const bCur = batVals.length ? batVals[batVals.length - 1] : null;
    const batSvg = batVals.length ? `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${sparklineSvg(battery, W, H)}</svg>` : '';
    return `
      <div class="profile-group" data-profile-pid="${escape(p.id)}">
        <div class="profile">
          <h4>Elevation <span class="range">${eMin != null ? eMin.toFixed(0) + '–' + eMax.toFixed(0) + ' m' : '—'}</span></h4>
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${sparklineSvg(elev, W, H)}</svg>
        </div>
        <div class="profile speed">
          <h4>Speed <span class="range">${sMax != null ? 'max ' + sMax.toFixed(1) + ' · avg ' + sAvg.toFixed(1) + ' km/h' : '—'}</span></h4>
          <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${sparklineSvg(speed, W, H)}</svg>
        </div>
        ${batSvg ? `<div class="profile battery">
          <h4>Battery <span class="range">${bCur != null ? 'now ' + bCur + '%' : ''}${bMin != null ? ' · min ' + bMin + '%' : ''}</span></h4>
          ${batSvg}
        </div>` : ''}
        <div class="profile-controls">
          <input id="profile-cursor" type="range" min="0" max="1000" step="1" value="1000" />
          <div id="profile-readout" class="profile-readout">—</div>
        </div>
      </div>
    `;
  }

  function initProfileCursor(p) {
    const group = document.querySelector('.profile-group');
    if (!group) return;
    const track = ((state.tracks && state.tracks.tracks) || []).find(t => t.participant_id === p.id);
    if (!track || !track.track || track.track.length < 2) return;
    const pts = track.track;
    const t0 = pts[0][0], tN = pts[pts.length - 1][0];
    const slider = group.querySelector('#profile-cursor');
    const readout = group.querySelector('#profile-readout');
    const svgs = Array.from(group.querySelectorAll('.profile svg'));
    const W = 600;
    const startMs = eventStartMs();
    const SVG_NS = 'http://www.w3.org/2000/svg';

    const cursors = svgs.map(svg => {
      const vb = (svg.getAttribute('viewBox') || '').split(/\s+/);
      const h = parseFloat(vb[3] || '80');
      const line = document.createElementNS(SVG_NS, 'line');
      line.setAttribute('class', 'profile-cursor');
      line.setAttribute('y1', '0');
      line.setAttribute('y2', String(h));
      svg.appendChild(line);
      return line;
    });

    function nearestIdx(t) {
      if (t <= pts[0][0]) return 0;
      if (t >= pts[pts.length - 1][0]) return pts.length - 1;
      let lo = 0, hi = pts.length - 1;
      while (lo < hi - 1) {
        const mid = (lo + hi) >> 1;
        if (pts[mid][0] <= t) lo = mid; else hi = mid;
      }
      return (Math.abs(pts[lo][0] - t) < Math.abs(pts[hi][0] - t)) ? lo : hi;
    }

    function update(f) {
      const t = t0 + f * (tN - t0);
      const idx = nearestIdx(t);
      const pt = pts[idx];
      const x = f * W;
      for (const c of cursors) {
        c.setAttribute('x1', x);
        c.setAttribute('x2', x);
      }
      const whenMs = startMs != null ? startMs + pt[0] * 1000 : null;
      const when = whenMs != null
        ? new Date(whenMs).toLocaleString(undefined, { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' })
        : '—';
      const elev = pt[3] != null && !isNaN(pt[3]) ? pt[3].toFixed(0) + ' m' : '—';
      const spd = pt[4] != null && !isNaN(pt[4]) ? pt[4].toFixed(1) + ' km/h' : '—';
      const bat = pt[5] != null && !isNaN(pt[5]) ? ' · ' + pt[5] + '%' : '';
      readout.innerHTML = `<b>${escape(when)}</b> · ${elev} · ${spd}${bat}`;
    }

    slider.addEventListener('input', (ev) => {
      const f = parseFloat(ev.target.value) / 1000;
      update(f);
    });
    svgs.forEach(svg => {
      svg.addEventListener('mousemove', (ev) => {
        const rect = svg.getBoundingClientRect();
        if (rect.width <= 0) return;
        const f = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
        slider.value = Math.round(f * 1000);
        update(f);
      });
    });

    update(1);
  }

  function renderDetail(p) {
    const cps = (state.geo.cps || []).slice().sort((a, b) => a.order - b.order);
    const cp_rank = p.cp_rank || [];
    const tracks = (state.tracks.tracks || []).find(t => t.participant_id === p.id);
    const body = document.getElementById('body');
    const lastPoint = tracks && tracks.track && tracks.track.length ? tracks.track[tracks.track.length - 1] : null;
    const isFav = favs.has(p.id);
    body.innerHTML = `
      <h2>#${p.overall_rank ?? '-'} · ${escape(p.first_name || '')} ${escape(p.last_name || '')} ${p.nickname ? '“' + escape(p.nickname) + '”' : ''}${orgaBadge(p)} <button class="star ${isFav ? 'on' : ''}" data-action="fav" data-id="${escape(p.id)}" title="favorite" aria-pressed="${isFav}">★</button></h2>
      <p class="tagline">bib <b>${escape(p.bib || '-')}</b> · tracker ${escape(String(p.tracker || '-'))} · ${escape((p.attributes && p.attributes.category) || '')} · ${escape(p.country || '')}</p>
      <div class="grid">
        <div class="stat"><div class="label">Distance</div><div class="value">${fmtKm(p.distance)}</div></div>
        <div class="stat"><div class="label">Speed</div><div class="value">${fmtKmh(p.speed)}</div></div>
        <div class="stat"><div class="label">To next CP</div><div class="value">${fmtKm(p.distance_to_next_cp)}</div></div>
        <div class="stat"><div class="label">ETA next CP</div><div class="value">${fmtEtaDur(etaNextCpMs(p))}</div></div>
        <div class="stat"><div class="label">ETA finish</div><div class="value">${fmtEtaAt(etaFinishMs(p))}</div></div>
        <div class="stat"><div class="label">Overall rank</div><div class="value">#${p.overall_rank ?? '-'}</div></div>
        <div class="stat"><div class="label">Category rank</div><div class="value">#${p.rank ?? '-'}</div></div>
        <div class="stat"><div class="label">Last ping</div><div class="value">${sinceText(p.last_ping)}</div></div>
        <div class="stat"><div class="label">Battery</div><div class="value">${p.battery != null ? p.battery + '%' : '—'}</div></div>
        <div class="stat"><div class="label">Status</div><div class="value">${escape(p.status || '—')}${p.sleeping ? ' · zZz' : ''}</div></div>
      </div>
      ${lastPoint ? `<div class="weather-card" id="weather-card" data-pid="${escape(p.id)}"><span class="wc-emoji">…</span><div class="wc-main"><div class="wc-temp">loading</div><div class="wc-meta">weather at ${lastPoint[1].toFixed(3)}, ${lastPoint[2].toFixed(3)}</div></div></div>` : ''}
      ${renderProfiles(p)}
      ${renderRestTimeline(p)}
      ${renderSegments(p)}
      ${renderKmSegments(p, 100)}
      ${renderNearby(p)}
      <h3 style="margin:18px 0 6px">Checkpoints</h3>
      <table>
        <thead><tr><th>#</th><th>Name</th><th class="n">Rank</th><th>When</th></tr></thead>
        <tbody>${cps.map(c => {
          const entry = cp_rank[c.order];
          const rank = entry && entry[0];
          const when = entry && entry[1];
          return `<tr>
            <td>${c.order}</td>
            <td><b>${escape(c.short_name || '')}</b> — ${escape(c.name || '')}</td>
            <td class="n">${rank != null ? '#' + rank : '—'}</td>
            <td>${when ? fmtTime(when) : '—'}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      ${lastPoint ? `
        <h3 style="margin:18px 0 6px">Last known position</h3>
        <p>lat <b>${lastPoint[1].toFixed(5)}</b>, lng <b>${lastPoint[2].toFixed(5)}</b>, elevation <b>${lastPoint[3]} m</b> · <a href="https://www.google.com/maps?q=${lastPoint[1]},${lastPoint[2]}" target="_blank" rel="noopener">open in Maps</a></p>
        <p style="color:var(--mute)">Track has ${tracks.track.length} points.</p>
      ` : `<p style="color:var(--mute)">No track points yet.</p>`}
    `;
    initProfileCursor(p);
    if (lastPoint) updateWeatherCard(p.id, lastPoint[1], lastPoint[2]);
  }

  function escape(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  {
    const btn = document.getElementById('map-settings');
    const panel = document.getElementById('map-settings-panel');
    if (btn && panel) {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const open = panel.classList.toggle('open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        panel.setAttribute('aria-hidden', open ? 'false' : 'true');
      });
      document.addEventListener('click', (ev) => {
        if (!panel.classList.contains('open')) return;
        if (panel.contains(ev.target) || btn.contains(ev.target)) return;
        panel.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
        panel.setAttribute('aria-hidden', 'true');
      });
    }
  }

  document.getElementById('side-menu-open').addEventListener('click', openSideMenu);
  document.getElementById('side-menu-close').addEventListener('click', closeSideMenu);
  document.getElementById('side-menu-backdrop').addEventListener('click', closeSideMenu);
  document.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape' && document.getElementById('side-menu').classList.contains('open')) {
      closeSideMenu();
      return;
    }
    if (mode !== 'event') return;
    const t = ev.target;
    const tag = (t && t.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (t && t.isContentEditable)) return;
    if (ev.ctrlKey || ev.metaKey || ev.altKey) return;
    const k = ev.key;
    if (k === 'j' || k === 'ArrowDown') { moveSelection(1); ev.preventDefault(); }
    else if (k === 'k' || k === 'ArrowUp') { moveSelection(-1); ev.preventDefault(); }
    else if (k === 'm') { setTab('map'); ev.preventDefault(); }
    else if (k === 'l') { setTab('list'); ev.preventDefault(); }
    else if (k === 'e') { setTab('feed'); ev.preventDefault(); }
    else if (k === 'f') { if (selected) toggleFav(selected.id); ev.preventDefault(); }
    else if (k === ' ') { togglePlay(); ev.preventDefault(); }
    else if (k === '/') {
      const q = (currentTab === 'map') ? document.getElementById('mapq') : document.getElementById('q');
      if (q) { q.focus(); q.select(); ev.preventDefault(); }
    } else if (k === 'Escape') {
      if (selected) { selected = null; render(); }
    }
  });

  function moveSelection(delta) {
    if (!state || !state.participants) return;
    const list = filteredParticipants();
    if (!list.length) return;
    let idx = selected ? list.findIndex(p => p.id === selected.id) : -1;
    idx = idx < 0 ? (delta > 0 ? 0 : list.length - 1)
                  : Math.max(0, Math.min(list.length - 1, idx + delta));
    selected = list[idx];
    render();
    if (currentTab === 'list') {
      const el = document.querySelector(`.p[data-id="${CSS.escape(selected.id)}"]`);
      if (el) el.scrollIntoView({ block: 'nearest' });
    }
  }

  document.querySelectorAll('[data-ffilter]').forEach(b => {
    b.addEventListener('click', () => {
      feedFilter = b.dataset.ffilter;
      document.querySelectorAll('[data-ffilter]').forEach(x => x.classList.toggle('active', x === b));
      renderFeed();
    });
  });

  document.getElementById('scrub-play').addEventListener('click', togglePlay);
  document.getElementById('scrub-live').addEventListener('click', () => {
    stopPlayback();
    playbackTime = null;
    updateScrubberUI();
    scheduleRenderMap();
  });
  document.getElementById('scrub-speed').addEventListener('change', (ev) => {
    playSpeedFactor = parseFloat(ev.target.value) || 1200;
  });
  document.getElementById('scrub-slider').addEventListener('input', (ev) => {
    if (playing) stopPlayback();
    const startMs = eventStartMs();
    const end = currentMaxTime();
    if (!startMs || !end) return;
    const f = parseFloat(ev.target.value) / 1000;
    setPlaybackTime(startMs + f * (end - startMs));
  });

  document.getElementById('q').addEventListener('input', () => renderList());
  document.getElementById('catbar').addEventListener('click', (ev) => {
    const b = ev.target.closest('.pill[data-cat]');
    if (!b) return;
    catFilter = b.dataset.cat || null;
    renderList();
    writeUrlState();
  });
  document.getElementById('favonly').addEventListener('click', () => setFavOnly(!favOnly));
  document.getElementById('map-favonly').addEventListener('click', () => setFavOnly(!favOnly));
  document.getElementById('map-traces').addEventListener('click', () => setShowTraces(!showTraces));
  document.getElementById('map-elev').addEventListener('click', () => setShowElev(!showElev));
  document.getElementById('map-journals').addEventListener('click', () => setShowJournalPins(!showJournalPins));
  document.getElementById('map-follow').addEventListener('click', () => setFollowSelected(!followSelected));
  document.getElementById('map-night').addEventListener('click', () => setShowNight(!showNight));
  document.getElementById('map-wind').addEventListener('click', () => setShowWind(!showWind));

  // -------- home view ----------
  function parseISO(s) { return parseUtc(s); }

  function classifyEvent(e) {
    const now = Date.now();
    const start = parseISO(e.start_date);
    const end = parseISO(e.end_date);
    if (start && end && now >= start.getTime() && now <= end.getTime()) return 'live';
    if (start && now < start.getTime()) return 'upcoming';
    return 'past';
  }

  function fmtRange(e) {
    const s = parseISO(e.start_date);
    const en = parseISO(e.end_date);
    if (!s && !en) return '';
    const opts = { month: 'short', day: '2-digit', year: '2-digit' };
    return `${s ? s.toLocaleDateString(undefined, opts) : '?'} → ${en ? en.toLocaleDateString(undefined, opts) : '?'}`;
  }

  async function loadHome() {
    const t0 = performance.now();
    const res = await fetch('/api/events');
    if (!res.ok) throw new Error('events endpoint ' + res.status);
    const txt = await res.text();
    const ttfb = performance.now() - t0;
    eventsList = JSON.parse(txt).events || [];
    document.getElementById('header-context').innerHTML = `<b>${eventsList.length}</b> events`;
    document.getElementById('status').className = 'badge live';
    document.getElementById('status').textContent = 'live';
    document.getElementById('perf').innerHTML = `ttfb <b>${ttfb.toFixed(0)} ms</b> · payload <b>${(txt.length / 1024).toFixed(0)} KB</b> · upstream-ms <b>${res.headers.get('x-upstream-ms') || '?'}</b>`;
    renderHome();
  }

  function renderHome() {
    if (!eventsList) return;
    const q = (document.getElementById('homeq').value || '').trim().toLowerCase();
    let list = eventsList.slice();
    for (const e of list) e._class = classifyEvent(e);
    if (homeFilter !== 'all') list = list.filter(e => e._class === homeFilter);
    if (q) list = list.filter(e =>
      (e.name || '').toLowerCase().includes(q) ||
      (e.slug || '').toLowerCase().includes(q) ||
      (e.start_place_name || '').toLowerCase().includes(q) ||
      (e.end_place_name || '').toLowerCase().includes(q)
    );
    // Sort: live first, then upcoming by start asc, then past by start desc
    const rank = c => c === 'live' ? 0 : c === 'upcoming' ? 1 : 2;
    list.sort((a, b) => {
      const r = rank(a._class) - rank(b._class);
      if (r !== 0) return r;
      const sa = parseISO(a.start_date)?.getTime() ?? 0;
      const sb = parseISO(b.start_date)?.getTime() ?? 0;
      if (a._class === 'past') return sb - sa;
      return sa - sb;
    });

    document.getElementById('home-count').textContent = `${list.length} / ${eventsList.length}`;
    const cards = document.getElementById('cards');
    if (!list.length) { cards.innerHTML = '<div style="color:var(--mute)">no events match</div>'; return; }
    const frag = document.createDocumentFragment();
    for (const e of list) {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = '/event/' + encodeURIComponent(e.slug);
      const places = [e.start_place_name, e.end_place_name].filter(Boolean).join(' → ');
      const chipClass = e._class === 'live' ? 'live' : e._class === 'upcoming' ? 'soon' : 'past';
      const chipLabel = e._class === 'live' ? 'LIVE' : e._class === 'upcoming' ? 'UPCOMING' : 'PAST';
      a.innerHTML = `
        ${e.banner ? `<div class="banner" style="background-image:url('${escapeAttr(e.banner)}')"></div>` : ''}
        <div class="body">
          <div class="title">${escape(e.name || e.slug)}</div>
          ${places ? `<div class="places">${escape(places)}</div>` : ''}
          <div class="row">
            <span class="chip ${chipClass}">${chipLabel}</span>
            ${e.distance ? `<span class="chip">${escape(e.distance)}</span>` : ''}
            ${e.surface ? `<span class="chip">${escape(e.surface)}</span>` : ''}
            ${typeof e.participants === 'number' && e.participants > 0 ? `<span class="chip">${e.participants} riders</span>` : ''}
          </div>
          <div class="dates">${escape(fmtRange(e))}</div>
        </div>
      `;
      frag.appendChild(a);
    }
    cards.replaceChildren(frag);
  }

  function escapeAttr(s) { return escape(s).replace(/\(/g, '%28').replace(/\)/g, '%29'); }

  function showHomeView() {
    document.getElementById('view-home').classList.add('active');
    document.getElementById('view-list').classList.remove('active');
    document.getElementById('view-map').classList.remove('active');
    document.getElementById('tabs').style.display = 'none';
    document.getElementById('home-link').style.display = 'none';
  }

  function showEventView() {
    document.getElementById('view-home').classList.remove('active');
    document.getElementById('view-list').classList.add('active');
    document.getElementById('tabs').style.display = '';
    document.getElementById('home-link').style.display = '';
  }

  // --------- boot ---------
  if (mode === 'home') {
    document.title = 'madcap_fast · events';
    showHomeView();
    document.getElementById('homeq').addEventListener('input', renderHome);
    document.querySelectorAll('.pill').forEach(b => b.addEventListener('click', () => {
      homeFilter = b.dataset.filter;
      document.querySelectorAll('.pill').forEach(x => x.classList.toggle('active', x === b));
      renderHome();
    }));
    loadHome().catch(e => {
      document.getElementById('cards').innerHTML = `<div class="err">${escape(e.message)}</div>`;
    });
    refreshTimer = setInterval(() => loadHome().catch(() => {}), 60000);
  } else {
    document.getElementById('header-context').innerHTML = `event <b>${escape(slug)}</b>`;
    showEventView();
    updateNotifBtn();
    document.getElementById('notif-toggle').addEventListener('click', toggleNotif);
    const urlState = readUrlState();
    catFilter = urlState.cat;
    favOnly = urlState.favOnly;
    ['favonly', 'map-favonly'].forEach(id => {
      const b = document.getElementById(id);
      if (b) { b.classList.toggle('on', favOnly); b.setAttribute('aria-pressed', favOnly); }
    });
    const tracesBtn = document.getElementById('map-traces');
    if (tracesBtn) { tracesBtn.classList.toggle('on', showTraces); tracesBtn.setAttribute('aria-pressed', showTraces); }
    const elevBtn = document.getElementById('map-elev');
    if (elevBtn) { elevBtn.classList.toggle('on', showElev); elevBtn.setAttribute('aria-pressed', showElev); }
    const jBtn = document.getElementById('map-journals');
    if (jBtn) { jBtn.classList.toggle('on', showJournalPins); jBtn.setAttribute('aria-pressed', showJournalPins); }
    const fBtn = document.getElementById('map-follow');
    if (fBtn) { fBtn.classList.toggle('on', followSelected); fBtn.setAttribute('aria-pressed', followSelected); }
    const nBtn = document.getElementById('map-night');
    if (nBtn) { nBtn.classList.toggle('on', showNight); nBtn.setAttribute('aria-pressed', showNight); }
    const wBtn = document.getElementById('map-wind');
    if (wBtn) { wBtn.classList.toggle('on', showWind); wBtn.setAttribute('aria-pressed', showWind); }
    load().then(() => {
      if (urlState.pid) {
        const p = state.participants.find(x => x.id === urlState.pid);
        if (p) { selected = p; render(); }
      }
      if (urlState.tab && urlState.tab !== 'list') setTab(urlState.tab);
      refreshTimer = setInterval(load, 30000);
    }).catch(e => {
      document.getElementById('body').innerHTML = `<div class="err">${escape(e.message)}</div>`;
    });
  }
})();
</script>
</body>
</html>
