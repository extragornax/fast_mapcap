services:
  madcap_fast:
    build:
      context: .
      dockerfile: Dockerfile
    image: madcap_fast:latest
    container_name: madcap_fast
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-9004}:9004"
    environment:
      PORT: "9004"
      MADCAP_WARM_SLUG: "${MADCAP_WARM_SLUG:-desertus-bikus-26}"
      MADCAP_CACHE_DIR: "${MADCAP_CACHE_DIR:-/var/cache/madcap_fast}"
      RUST_LOG: "${RUST_LOG:-madcap_fast=info,tower_http=info}"
    volumes:
      - cache:/var/cache/madcap_fast
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9004/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    read_only: true
    cap_drop:
      - ALL

  prometheus:
    image: prom/prometheus:latest
    container_name: madcap_fast_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - madcap_fast

volumes:
  cache:
  prometheus-data:
