global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: madcap_fast
    metrics_path: /metrics
    static_configs:
      # Same compose network as madcap_fast → reach it by service name.
      - targets: ["madcap_fast:9004"]
        labels:
          instance: madcap_fast

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
