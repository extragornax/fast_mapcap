apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Prometheus runs in the main docker-compose stack; Grafana reaches it
    # via the host bridge (see `extra_hosts` in docker-compose.monitoring.yml).
    url: http://host.docker.internal:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "30s"
